version: "3.9"

services:
  db:
    image: postgres:15
    container_name: proceso_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: proceso
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./api
    container_name: proceso_api
    depends_on:
      - db
    ports:
      - "5180:8080"
    environment:
    - ConnectionStrings__Default=Host=db;Port=5432;Database=proceso;Username=postgres;Password=postgres
    - PYTHON_EXECUTABLE=python3
    - PYTHON_WORKER_PATH=/worker/main.py
    volumes:
      - ./worker:/worker

  frontend:
    build: ./dashboard
    container_name: proceso_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data: